<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Products</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.5px; }
    header span { font-size: 0.9rem; opacity: 0.7; }

    #layout {
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem;
      align-items: flex-start;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Product grid ── */
    #products-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1.2rem;
    }

    .product-card {
      background: #fff;
      border: 1px solid #e4e4e4;
      border-radius: 10px;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: box-shadow 0.15s;
    }
    .product-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.09); }

    .product-card .category-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      background: #eef0ff;
      color: #4c51bf;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .product-card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.35;
      flex: 1;
    }

    .product-card .description {
      font-size: 0.8rem;
      color: #666;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-card .price {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .product-card .stock {
      font-size: 0.75rem;
      color: #38a169;
    }
    .product-card .stock.out { color: #e53e3e; }

    .add-btn {
      margin-top: auto;
      padding: 0.55rem 0;
      background: #4c51bf;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .add-btn:hover:not(:disabled) { background: #3c40a0; }
    .add-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Cart sidebar ── */
    #cart-sidebar {
      width: 300px;
      flex-shrink: 0;
      position: sticky;
      top: 1.5rem;
      background: #fff;
      border: 1px solid #e4e4e4;
      border-radius: 10px;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    #cart-sidebar h2 {
      font-size: 1rem;
      font-weight: 700;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.6rem;
    }

    #cart-empty-msg {
      font-size: 0.85rem;
      color: #999;
      text-align: center;
      padding: 0.5rem 0;
    }

    #cart-items { display: flex; flex-direction: column; gap: 0.55rem; }

    .cart-row {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.82rem;
    }
    .cart-row .cart-row-info { flex: 1; line-height: 1.4; }
    .cart-row .cart-row-name { font-weight: 600; }
    .cart-row .cart-row-sub { color: #666; }
    .remove-btn {
      background: none;
      border: none;
      color: #e53e3e;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: #c53030; }

    #cart-total {
      font-size: 0.95rem;
      font-weight: 700;
      border-top: 1px solid #eee;
      padding-top: 0.6rem;
      text-align: right;
    }

    #go-to-cart-btn {
      display: block;
      padding: 0.6rem;
      background: #1a1a2e;
      color: #fff;
      border-radius: 6px;
      text-align: center;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    #go-to-cart-btn:hover { background: #2d2d4e; }

    #loading-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: #666;
    }
  </style>
</head>
<body>

<header>
  <h1>eCommerce Store</h1>
  <span>Browse our products</span>
</header>

<div id="layout">
  <section id="products-grid">
    <p id="loading-msg">Loading products…</p>
  </section>

  <aside id="cart-sidebar">
    <h2>Cart <span id="cart-count" style="font-weight:400;color:#666;"></span></h2>
    <p id="cart-empty-msg">Your cart is empty.</p>
    <div id="cart-items"></div>
    <div id="cart-total" style="display:none">Total: $0.00</div>
    <a href="/cart.html" id="go-to-cart-btn" style="display:none">View Full Cart →</a>
  </aside>
</div>

<script>
  const USER_ID = 1;

  // ── Boot ──────────────────────────────────────────────────────────────────
  fetchProducts();
  fetchCart();

  // ── Products ──────────────────────────────────────────────────────────────
  async function fetchProducts() {
    try {
      const res = await fetch('/api/products/active');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const products = await res.json();
      renderProducts(products);
    } catch (err) {
      document.getElementById('loading-msg').textContent = `Failed to load products: ${err.message}`;
    }
  }

  function renderProducts(products) {
    const grid = document.getElementById('products-grid');
    grid.innerHTML = '';

    if (!products.length) {
      grid.innerHTML = '<p id="loading-msg">No products available.</p>';
      return;
    }

    products.forEach(p => {
      const outOfStock = p.stockQuantity === 0;
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <span class="category-badge">${esc(p.category || 'General')}</span>
        <h3>${esc(p.name)}</h3>
        ${p.description ? `<p class="description">${esc(p.description)}</p>` : ''}
        <span class="price">$${Number(p.price).toFixed(2)}</span>
        <span class="stock ${outOfStock ? 'out' : ''}">
          ${outOfStock ? 'Out of stock' : `${p.stockQuantity} in stock`}
        </span>
        <button class="add-btn" data-product-id="${p.id}" ${outOfStock ? 'disabled' : ''}>
          Add to Cart
        </button>
      `;
      card.querySelector('.add-btn').addEventListener('click', () => addToCart(p.id, card.querySelector('.add-btn')));
      grid.appendChild(card);
    });
  }

  // ── Cart fetch & render ───────────────────────────────────────────────────
  async function fetchCart() {
    try {
      const res = await fetch(`/api/cart/user/${USER_ID}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const cart = await res.json();
      renderSidebar(cart);
    } catch (err) {
      console.error('Cart fetch failed:', err);
    }
  }

  function renderSidebar(cart) {
    const items = cart.cartItems || [];
    const emptyMsg = document.getElementById('cart-empty-msg');
    const itemsEl = document.getElementById('cart-items');
    const totalEl = document.getElementById('cart-total');
    const linkEl = document.getElementById('go-to-cart-btn');
    const countEl = document.getElementById('cart-count');

    itemsEl.innerHTML = '';

    if (!items.length) {
      emptyMsg.style.display = '';
      totalEl.style.display = 'none';
      linkEl.style.display = 'none';
      countEl.textContent = '';
      return;
    }

    emptyMsg.style.display = 'none';
    totalEl.style.display = '';
    linkEl.style.display = '';
    countEl.textContent = `(${items.length})`;

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'cart-row';
      row.innerHTML = `
        <div class="cart-row-info">
          <div class="cart-row-name">${esc(item.productName)}</div>
          <div class="cart-row-sub">Qty: ${item.quantity} · $${Number(item.subtotal).toFixed(2)}</div>
        </div>
        <button class="remove-btn" title="Remove" data-item-id="${item.id}">✕</button>
      `;
      row.querySelector('.remove-btn').addEventListener('click', () => removeFromCart(item.id));
      itemsEl.appendChild(row);
    });

    totalEl.textContent = `Total: $${Number(cart.totalAmount).toFixed(2)}`;
  }

  // ── Add to cart ───────────────────────────────────────────────────────────
  async function addToCart(productId, btn) {
    const original = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Adding…';
    try {
      const res = await fetch(`/api/cart/user/${USER_ID}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId, quantity: 1 })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert(`Could not add item: ${err.message || res.statusText}`);
        return;
      }
      const cart = await res.json();
      renderSidebar(cart);
      btn.textContent = 'Added ✓';
      setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 1200);
    } catch (err) {
      alert(`Error: ${err.message}`);
      btn.textContent = original;
      btn.disabled = false;
    }
  }

  // ── Remove from cart ──────────────────────────────────────────────────────
  async function removeFromCart(itemId) {
    try {
      const res = await fetch(`/api/cart/user/${USER_ID}/items/${itemId}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const cart = await res.json();
      renderSidebar(cart);
    } catch (err) {
      alert(`Could not remove item: ${err.message}`);
    }
  }

  // ── Utility ───────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
